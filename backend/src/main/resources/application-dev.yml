spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mindrift_db}
    username: ${SPRING_DATASOURCE_USERNAME:mindrift_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin_production_password_2026}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.mindrift: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
