spring:
  application:
    name: mindrift-backend
  profiles:
    active: dev
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: MindriftHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 20000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
  data:
    redis:
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 2
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true

mindrift:
  kafka:
    topics:
      quiz-scored: quiz-scored
      quiz-scored-dlq: quiz-scored-dlq
      integrity-events: integrity-events
      integrity-events-dlq: integrity-events-dlq
      ai-events: ai-events
      ai-events-dlq: ai-events-dlq

  ai:
    gemini:
      enabled: ${GEMINI_ENABLED:true}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-1.5-flash}
    openai:
      enabled: ${OPENAI_ENABLED:true}
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
    claude:
      enabled: ${CLAUDE_ENABLED:true}
      api-key: ${CLAUDE_API_KEY:}
      model: ${CLAUDE_MODEL:claude-3-haiku-20240307}
    token-daily-limit: ${AI_TOKEN_DAILY_LIMIT:100000}

storage:
  provider: ${STORAGE_PROVIDER:local}
  local:
    dir: ${STORAGE_LOCAL_DIR:./storage_uploads}
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:mindrift-storage}
    public-url: ${SUPABASE_PUBLIC_URL:}

