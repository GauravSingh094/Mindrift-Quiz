spring:
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mindrift_db}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME:mindrift_admin}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:admin_production_password_2026}}
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 10000
  data:
    redis:
      host: ${REDIS_HOST:${SPRING_DATA_REDIS_HOST:localhost}}
      port: ${REDIS_PORT:${SPRING_DATA_REDIS_PORT:6379}}
      password: ${REDIS_PASSWORD:${SPRING_DATA_REDIS_PASSWORD:}}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
      lettuce:
        pool:
          max-active: 4
          max-idle: 2
          min-idle: 1
  jpa:
    show-sql: false

logging:
  level:
    com.mindrift: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

storage:
  provider: ${STORAGE_PROVIDER:supabase}
  supabase:
    url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:mindrift-storage}
    public-url: ${SUPABASE_PUBLIC_URL:}
