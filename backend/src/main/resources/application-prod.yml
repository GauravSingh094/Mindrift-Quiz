spring:
  datasource:
    url: ${DATABASE_URL:${SPRING_DATASOURCE_URL}}
    username: ${DATABASE_USERNAME:${SPRING_DATASOURCE_USERNAME}}
    password: ${DATABASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
  data:
    redis:
      host: ${REDIS_HOST:${SPRING_DATA_REDIS_HOST:localhost}}
      port: ${REDIS_PORT:${SPRING_DATA_REDIS_PORT:6379}}
      password: ${REDIS_PASSWORD:${SPRING_DATA_REDIS_PASSWORD:}}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  jpa:
    show-sql: false

logging:
  level:
    com.mindrift: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

storage:
  provider: ${STORAGE_PROVIDER:supabase}
  supabase:
    url: ${SUPABASE_URL}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY}
    bucket: ${SUPABASE_STORAGE_BUCKET:mindrift-storage}
    public-url: ${SUPABASE_PUBLIC_URL}
