version: '3.8'

services:
  mindrift-db:
    image: postgres:16-alpine
    container_name: mindrift-postgres
    environment:
      POSTGRES_DB: mindrift_db
      POSTGRES_USER: mindrift_admin
      POSTGRES_PASSWORD: admin_production_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindrift_admin -d mindrift_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindrift-network

  mindrift-cache:
    image: redis:7.2-alpine
    container_name: mindrift-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mindrift-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: mindrift-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - mindrift-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: mindrift-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
  mindrift-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindrift-backend-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=mindrift-cache
      - SPRING_DATA_REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      mindrift-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - mindrift-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  mindrift-network:
    driver: bridge
